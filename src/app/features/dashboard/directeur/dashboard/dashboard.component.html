<div class="welcome-section">
  <h1>Tableau de Bord</h1>
  <p *ngIf="!loading">
    Bienvenue, <strong>{{ currentUser?.prenom }} {{ currentUser?.nom }}</strong> |
    <span class="etab-badge">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 5px;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
      {{ stats.etablissement }}
    </span>
  </p>
  <p *ngIf="loading" class="searching-text">
    <i class="fas fa-sync fa-spin"></i> Chargement des données...
  </p>
</div>

<div class="stats-grid">

  <div class="stat-card admin-card">
    <div class="stat-icon-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
    </div>
    <div class="stat-info">
      <p class="stat-label">Administrateurs</p>
      <h3 class="stat-number" *ngIf="!loading">{{ stats.admins }}</h3>
      <div *ngIf="loading" class="spinner-small"></div>
    </div>
  </div>

  <div class="stat-card candidat-card">
    <div class="stat-icon-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
    </div>
    <div class="stat-info">
      <p class="stat-label">Candidats</p>
      <h3 class="stat-number" *ngIf="!loading">{{ stats.candidats }}</h3>
      <div *ngIf="loading" class="spinner-small"></div>
    </div>
  </div>

  <div class="stat-card spec-card">
    <div class="stat-icon-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
    </div>
    <div class="stat-info">
      <p class="stat-label">Spécialités</p>
      <h3 class="stat-number" *ngIf="!loading">{{ stats.specialites }}</h3>
      <div *ngIf="loading" class="spinner-small"></div>
    </div>
  </div>

</div>

<div class="info-banner" *ngIf="!loading && stats.admins === 0 && stats.candidats === 0">
  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 10px;"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
  Aucune donnée n'est disponible pour cet établissement.
</div>
