<div class="admin-container">
  <div class="admin-header">
    <div class="header-title">
      <h1>Gestion des Seuils d'Admission</h1>
      <p class="text-muted">{{ modulesSansSeuil.length }} modules nécessitent une attention immédiate.</p>
    </div>
  </div>


  <div class="filter-section" style="margin-bottom: 20px; display: flex; gap: 15px;">
    <div class="search-container" style="width: 100%; max-width: 500px;">
      <i class="fas fa-search"></i>
      <input type="text" placeholder="Rechercher..." [(ngModel)]="searchTerm">
    </div>
    <select class="form-control" style="width: 200px;" [(ngModel)]="filterStatus">
      <option value="all">Tous les modules</option>
      <option value="missing">Seuils manquants</option>
      <option value="defined">Seuils définis</option>
    </select>
  </div>

  <!-- Table -->
  <div class="table-container">
    <table class="modern-table">
      <thead>
      <tr>
        <th>Module</th>
        <th>Seuil Actuel</th>
        <th style="text-align: center;">Actions</th>
      </tr>
      </thead>
      <tbody>
      <tr *ngFor="let mod of filteredModules()">
        <td>
          <div style="font-weight: 600;">{{ mod.module?.nom }}</div>
        </td>
        <td>
          <div *ngIf="mod.seuilScore; else noSeuil">
            <span class="status-badge" style="background: rgba(34, 211, 238, 0.1); color: #0891b2;">
              {{ mod.seuilScore }}
            </span>
          </div>
          <ng-template #noSeuil>
            <span class="status-badge inactive">Non configuré</span>
          </ng-template>
        </td>
        <td>
          <div class="actions" style="justify-content: center;">
            <button class="btn-edit" (click)="ouvrirModal(mod)" title="Modifier">
              <i class="fas fa-edit"></i>
            </button>
            <button class="btn-delete" (click)="supprimerSeuil(mod)" *ngIf="mod.seuilScore" title="Réinitialiser">
              <i class="fas fa-undo"></i>
            </button>
          </div>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>


<div class="modal" *ngIf="showModal" (click)="showModal = false">
  <div class="modal-content" (click)="$event.stopPropagation()" style="width: 450px;">

    <div class="modal-header">
      <h2 style="color: var(--text-muted);">Configuration du Seuil</h2>
      <button type="button" class="btn-remove-item" (click)="showModal = false">&times;</button>
    </div>

    <form (ngSubmit)="sauvegarder()">

      <div class="profile-info" style="padding: 10px 0; text-align: center; margin-bottom: 15px; color: var(--text-muted);">
        <h2>{{ selectedModule?.module?.nom }}</h2>
        <p class="text-muted" style="font-size: 0.85rem; color: var(--text-muted);">Définition du score minimal d'admission</p>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Note minimale (Score )</label>
          <input
            type="number"
            [(ngModel)]="tempSeuil"
            name="seuilScore"
            class="form-control">
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-cancel" (click)="showModal = false">Annuler</button>
        <button type="submit" class="btn-submit" [disabled]="tempSeuil === null">
          Enregistrer
        </button>
      </div>

    </form>
  </div>
</div>
