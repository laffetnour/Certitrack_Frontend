<div class="admin-container">

  <!-- 🔥 HEADER -->
  <div class="admin-header">
    <h1>Gestion des quotas</h1>

    <!--<div style="display:flex; gap:10px;">
      <button class="btn-cancel"
              routerLink="/adminTenant/moduleTenant"
              routerLinkActive="active">
        ← Catalogue Module
      </button>
    </div>-->
  </div>

  <!-- 🔥 TABLE CONTAINER -->
  <div class="table-container">

    <!-- 🔥 PHRASE -->
    <p style="margin-bottom: 15px; color: #555;">
      Modules activés uniquement
    </p>

    <!-- 🔥 FILTRES -->
    <div class="filter-select-container">

      <input type="text"
             class="status-filter-select"
             style="width: 300px;"
             [(ngModel)]="searchTerm"
             (input)="applyFilters()"
             placeholder="🔍 Rechercher un module...">

      <select class="status-filter-select"
              [(ngModel)]="testFilter"
              (change)="applyFilters()">

        <option value="">Tous les types</option>
        <option value="with">Avec Test</option>
        <option value="without">Sans Test</option>
      </select>

    </div>

    <!-- 🔥 TABLE -->
    <table class="modern-table">
      <thead>
      <tr>
        <th>Nom du Module</th>
        <th>Catégorie</th>
        <th>Type</th>
        <th>Capacité</th>
        <th style="text-align: center;">Action</th>
      </tr>
      </thead>

      <tbody>
      <tr *ngFor="let mt of filteredMyModules">

        <!-- NOM -->
        <td><strong>{{ mt.module.nom }}</strong></td>

        <!-- CATEGORIE -->
        <td>
            <span class="status-badge active"
                  style="background: #e9ecef; color: #495057;">
              {{ mt.module.nomCategorie }}
            </span>
        </td>

        <!-- TYPE TEST -->
        <td>
            <span class="status-badge active">
              {{ mt.avecTest ? 'Avec test' : 'Sans test' }}
            </span>
        </td>

        <!-- CAPACITE -->
        <td>
          <input type="number"
                 [(ngModel)]="mt.capacite"
                 class="form-control"
                 style="width: 100px;"
                 min="1">
        </td>

        <!-- ACTION -->
        <td style="text-align: center;">

            <!--<button class="btn-submit"
                    (click)="updateCapacite(mt)"
                    [disabled]="mt.capacite === mt.capaciteInitiale">


               Enregistrer

            </button>-->

          <!--<span *ngIf="mt.capacite === mt.capaciteInitiale" class="status-badge inactive">
            ✔ Enregistré
          </span>-->


          <button class="btn-animated"
                  (click)="updateCapacite(mt)"
                  [disabled]="mt.capacite === mt.capaciteInitiale"
                  [class.changed]="mt.capacite !== mt.capaciteInitiale"
                  [class.saved]="mt.capacite === mt.capaciteInitiale && mt.saved">

            <span class="btn-text" *ngIf="!(mt.capacite === mt.capaciteInitiale && mt.saved)">
                Enregistrer
            </span>

            <span class="btn-check" *ngIf="mt.capacite === mt.capaciteInitiale && mt.saved">
                ✔
            </span>
          </button>

          <style>
            .btn-animated {
              position: relative;
              display: inline-flex;
              align-items: center;
              justify-content: center;
              padding: 6px 18px;
              border-radius: 8px;
              font-weight: 500;
              font-size: 14px;
              color: #fff;
              border: none;
              cursor: pointer;
              transition: background-color 0.3s, transform 0.2s;
              background-color: #9e9e9e; /* gris par défaut */
            }

            .btn-animated.changed {
              background-color: #ea5357; /* bleu actif */
            }

            .btn-animated:hover:not(:disabled) {
              transform: translateY(-1px);
            }

            .btn-animated:disabled {
              cursor: not-allowed;
              background-color: #e0e0e0;
              color: #9e9e9e;
            }

            .btn-text {
              transition: opacity 0.3s;
            }

            .btn-check {
              opacity: 0;
              animation: checkFade 0.5s forwards;
              font-size: 16px;
            }

            @keyframes checkFade {
              0% { opacity: 0; transform: scale(0.5) rotate(-20deg); }
              50% { opacity: 1; transform: scale(1.2) rotate(10deg); }
              100% { opacity: 1; transform: scale(1) rotate(0deg); }
            }
          </style>



        </td>

      </tr>
      </tbody>
    </table>

    <!-- 🔥 EMPTY STATE -->
    <div *ngIf="filteredMyModules.length === 0 && !loading"
         class="empty-state"
         style="padding: 20px; text-align: center;">

      <p>Aucun module actif trouvé.</p>

    </div>

  </div>

</div>
