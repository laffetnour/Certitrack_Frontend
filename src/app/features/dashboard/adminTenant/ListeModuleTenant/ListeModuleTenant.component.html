<div class="admin-container">

  <div class="admin-header">
    <h1>Mon Catalogue de Modules</h1>
    <div style="display:flex; gap:10px;">
      <button class="btn-cancel" routerLink="/adminTenant/moduleTenant" routerLinkActive="active">
        ← Catalogue  Module
      </button>
    </div>
  </div>

  <div class="table-container">

    <div class="bulk-actions" *ngIf="selectedMyModulesIds.size > 0">
      <span>{{ selectedMyModulesIds.size }} module(s) sélectionné(s)</span>
      <button class="btn-deactivate" (click)="onBulkRemove()" style="background-color: #e74c3c;">
        Supprimer la sélection
      </button>
    </div>

    <table class="modern-table">
      <thead>
      <tr>
        <th style="width: 40px;">
          <input type="checkbox"
                 (change)="toggleAllMyModules($event)"
                 [checked]="isAllMyModulesSelected()">
        </th>

        <th>Nom du Module</th>
        <th>Catégorie</th>
        <th>Statut</th>
        <th style="text-align: center;">Actions</th>
      </tr>
      </thead>

      <tbody>
      <tr *ngFor="let mt of myModules">
        <td>
          <input type="checkbox"
                 [checked]="selectedMyModulesIds.has(mt.id)"
                 (change)="toggleMyModuleSelection(mt.id)">
        </td>
        <td><strong>{{ mt.module.nom }}</strong></td>
        <td>
            <span class="status-badge active" style="background: #e9ecef; color: #495057;">
              {{ mt.module.nomCategorie }}
            </span>
        </td>
        <td>
            <span class="status-badge" [class.active]="mt.estActif" [class.inactive]="!mt.estActif">
              {{ mt.estActif ? 'Actif' : 'En attente' }}
            </span>
        </td>
        <td class="actions" style="text-align: center;">
          <button class="btn-toggle" (click)="onRemoveModule(mt.id)" title="Retirer du catalogue" style="color: #e74c3c;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
          </button>
        </td>
      </tr>
      </tbody>
    </table>

    <div *ngIf="myModules.length === 0 && !loading" class="empty-state" style="padding: 20px; text-align: center;">
      <p>Vous n'avez aucun module pour le moment.</p>
    </div>
  </div>

  <hr style="margin: 40px 0; border: 0; border-top: 1px solid #eee;">




</div>
