<div class="admin-container">

  <!-- HEADER -->
  <div class="admin-header">
    <h1>Gestion des Établissements</h1>

    <div style="display:flex; gap:10px;">
      <button class="btn-add" (click)="openAddModal()">
        + Nouvel Établissement
      </button>
    </div>
  </div>

  <div *ngIf="selectedIds.size > 0" style="display:flex; gap:10px; align-items:center; background:#f0f0f0; padding:5px 15px; border-radius:8px;">
    <span style="font-weight:bold; font-size: 14px;">{{ selectedIds.size }} sélectionné(s)</span>

    <button class="btn-toggle" (click)="bulkToggle(true)" style="padding: 5px 10px; font-size: 12px;">Activer</button>
    <button class="btn-toggle" (click)="bulkToggle(false)" style="padding: 5px 10px; font-size: 12px;">Désactiver</button>
  </div>
  <!-- TABLE -->
  <div class="table-container">
    <div class="filter-select-container">
      <select class="status-filter-select"
              [(ngModel)]="statusFilter"
              (change)="filterByStatus()">
        <option value="">Tous les statuts</option>
        <option value="actif">Établissements activés</option>
        <option value="inactif">Établissements désactivés</option>
      </select>
    </div>

    <table class="modern-table">

      <thead>
      <tr>
        <th style="width: 40px;">
          <input type="checkbox" (change)="toggleAll($event)" [checked]="isAllSelected()">
        </th>
        <th></th>
        <th>Nom</th>
        <th>Adresse</th>

        <th>Statut</th>
        <th>Actions</th>
      </tr>
      </thead>

      <tbody>
      <tr *ngFor="let e of etablissements; trackBy: trackByEtab">
        <td style="width: 40px;">
          <input type="checkbox"
                 [checked]="selectedIds.has(e.idEtab)"
                 (change)="toggleSelection(e.idEtab)">
        </td>

        <td class="img-table-container">
          <img *ngIf="e.image" [src]="e.image" class="img-table-rect">

          <div *ngIf="!e.image" class="img-table-placeholder">
            LOGO
          </div>
        </td>
        <!-- NOM -->
        <td>{{ e.nom }}</td>


        <td>{{ e.adresse }}</td>

        <!-- STATUT -->
        <td>
          <span class="status-badge"
                [class.active]="e.statut"
                [class.inactive]="!e.statut">
            {{ e.statut ? 'Actif' : 'Inactif' }}
          </span>
        </td>

        <!-- ACTIONS -->
        <td class="actions">

          <!-- EDIT -->
          <button class="btn-edit" (click)="openEditModal(e)" title="Modifier">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                 viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.1 2.1 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>

          <!-- TOGGLE -->
          <button class="btn-toggle"
                  (click)="toggle(e)"
                  [title]="e.statut ? 'Désactiver' : 'Activer'">

            <!-- actif -->
            <svg *ngIf="e.statut" xmlns="http://www.w3.org/2000/svg"
                 width="16" height="16" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
            </svg>

            <!-- inactif -->
            <svg *ngIf="!e.statut" xmlns="http://www.w3.org/2000/svg"
                 width="16" height="16" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
              <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>

          </button>

          <!-- DELETE -->
         <!-- <button class="btn-delete"
                  (click)="openDeleteModal(e.idEtab)"
                  title="Supprimer">
            <svg xmlns="http://www.w3.org/2000/svg"
                 width="16" height="16"
                 viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/>
            </svg>
          </button>-->

        </td>

      </tr>
      </tbody>

    </table>

  </div>

  <!-- MODAL AJOUT / MODIF -->
  <div class="modal" *ngIf="showModal">
    <div class="modal-content">

      <div class="modal-header">
        <h2>{{ isEditMode ? 'Modifier' : 'Ajouter' }} Établissement</h2>
        <button (click)="closeModal()">✖</button>
      </div>

      <div class="input-group-container">
        <input [(ngModel)]="selectedNom"
               placeholder="Nom établissement"
               class="custom-input">
      </div>

      <div class="input-group-container">
        <input [(ngModel)]="selectedAdresse"
               placeholder="Adresse"
               class="custom-input">
      </div>

      <div  class="input-group-container">
        <label style="display: block; margin-bottom: 5px; font-size: 12px; color: #666;">Logo Établissement</label>
        <input type="file" (change)="onFileSelected($event)" accept="image/*" class="custom-input">

        <div *ngIf="selectedImage" class="img-modal-preview-container">
          <img [src]="selectedImage" alt="Aperçu" class="img-modal-rect">

          <button type="button" class="btn-remove-img" (click)="selectedImage = ''; imageRaw = ''">
            ✕ Supprimer l'image
          </button>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-submit" (click)="save()">
          {{ isEditMode ? 'Modifier' : 'Ajouter' }}
        </button>

        <button type="button" class="btn-cancel" (click)="closeModal()">
          Annuler
        </button>
      </div>

    </div>
  </div>

  <!-- MODAL DELETE -->
  <!--<div class="modal" *ngIf="showDeleteModal">
    <div class="modal-content">

      <div class="modal-header">
        <h2>Confirmation</h2>
      </div>

      <div style="padding:20px; text-align:center;">
        Êtes-vous sûr de vouloir supprimer cet établissement ?
      </div>

      <div class="modal-footer">
        <button class="btn-cancel" (click)="closeDeleteModal()">Annuler</button>
        <button class="btn-delete" (click)="confirmDelete()">Supprimer</button>
      </div>

    </div>
  </div>-->

</div>
