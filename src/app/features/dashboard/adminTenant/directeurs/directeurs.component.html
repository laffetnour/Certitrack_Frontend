<div class="admin-container">
  <div class="admin-header">
    <h1>Gestion des Directeurs</h1>

    <div style="display:flex; gap:10px;">
      <select class="form-control" [(ngModel)]="selectedEtablissement" (change)="filterByEtablissement()">
        <option value="">Tous les établissements</option>
        <option *ngFor="let e of etablissements" [value]="e.idEtab">
          {{ e.nom }}
        </option>
      </select>

      <button class="btn-add" (click)="openAddModal()">+ Nouveau Directeur</button>
    </div>
  </div>

  <div class="table-container">
    <table class="modern-table">
      <thead>
      <tr>
        <th>Nom & Prénom</th>
        <th>Email</th>
        <th>Établissement</th>
        <th>Statut</th>
        <th>Actions</th>
      </tr>
      </thead>
      <tbody>
      <tr *ngFor="let d of directeurs">
        <td>{{ d.nom }} {{ d.prenom }}</td>
        <td>{{ d.username }}</td>
        <td><span class="badge-etab">{{ d.nomEtablissement }}</span></td>
        <td>
            <span class="status-badge" [class.active]="d.statut">
              {{ d.statut ? 'Actif' : 'Inactif' }}
            </span>
        </td>
        <td class="actions">
          <button class="btn-edit" (click)="openEditModal(d)">✏️</button>
          <button class="btn-delete" (click)="deleteDirecteur(d.id)">🗑</button>
        </td>
      </tr>
      <tr *ngIf="directeurs.length === 0 && !loading">
        <td colspan="5" style="text-align: center;">Aucun directeur trouvé.</td>
      </tr>
      </tbody>
    </table>
  </div>

  <div class="modal" *ngIf="showModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>{{ isEditMode ? 'Modifier' : 'Ajouter' }} Directeur</h2>
        <button (click)="closeModal()">✖</button>
      </div>
      <form [formGroup]="directeurForm" (ngSubmit)="onSubmit()">
        <div class="form-row">
          <input formControlName="nom" placeholder="Nom" class="form-control">
          <input formControlName="prenom" placeholder="Prénom" class="form-control">
        </div>
        <input formControlName="username" placeholder="Email" class="form-control">
        <input formControlName="dateNais" type="date" class="form-control">

        <select formControlName="etablissementId" class="form-control">
          <option [ngValue]="null" disabled>-- Choisir établissement --</option>
          <option *ngFor="let e of etablissements" [value]="e.idEtab">
            {{ e.nom }}
          </option>
        </select>

        <input *ngIf="!isEditMode" formControlName="password" type="password" placeholder="Mot de passe" class="form-control">

        <div class="modal-footer">
          <button type="submit" class="btn-submit" [disabled]="directeurForm.invalid">Enregistrer</button>
          <button type="button" (click)="closeModal()">Annuler</button>
        </div>
      </form>
    </div>
  </div>
</div>
