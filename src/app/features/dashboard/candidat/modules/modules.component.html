<div class="content-area">

  <input
    type="text"
    placeholder="🔍 Rechercher un module..."
    [(ngModel)]="search"
    (input)="applyFilter()"
    class="search-input"
  />

  <h2 *ngIf="displayedModules.length > 0">Mes Modules</h2>
  <div class="stats-grid">
    <div class="stat-card" *ngFor="let m of displayedModules">
      <div class="stat-icon-wrapper"><i class="fas fa-book"></i></div>
      <div>
        <h3>{{ m.module?.nom }}</h3>
        <p>Catégorie : {{ m.module?.nomCategorie }}</p>
        <p *ngIf="m.avecTest">Score requis : {{ m.seuilScore }}%</p>
        <p *ngIf="m.avecTest" style="color: green;">✅ Avec test</p>
        <p *ngIf="!m.avecTest" style="color: orange;">ℹ️ Sans test</p>
        <button class="btn-inscrire">S'inscrire</button>
      </div>
    </div>
  </div>

  <div *ngIf="mode.includes('ouvert') && filteredOuverts.length > 0" class="actions-footer">
    <button (click)="toggleAutres()" class="btn-autres">
      {{ showAll ? '🔼 Cacher les autres' : '🔽 Afficher les autres modules disponibles' }}
    </button>
  </div>

  <div *ngIf="showAll" class="others-section" style="margin-top: 20px;">
    <h2 style="color: #666;">Autres modules disponibles</h2>
    <div class="stats-grid">
      <div class="stat-card" *ngFor="let m of filteredOuverts">
        <div class="stat-icon-wrapper"><i class="fas fa-graduation-cap"></i></div>
        <div>
          <h3>{{ m.module?.nom }}</h3>
          <p>Catégorie : {{ m.module?.nomCategorie }}</p>
          <p *ngIf="m.avecTest">Score requis : {{ m.seuilScore }}%</p>
          <p *ngIf="m.avecTest" style="color: green;">✅ Avec test</p>
          <p *ngIf="!m.avecTest" style="color: orange;">ℹ️ Sans test</p>
          <button class="btn-inscrire">S'inscrire</button>
        </div>
      </div>
    </div>
  </div>

</div>
