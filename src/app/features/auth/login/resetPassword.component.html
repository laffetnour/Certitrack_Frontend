<div class="auth-wrapper">
  <div class="auth-bg-overlay"></div>

  <div class="auth-container">
    <div class="auth-form-section" style="margin: auto; max-width: 500px;">
      <div class="form-card shadow-lg p-4">

        <div class="form-header text-center mb-4">
          <div class="reset-icon-wrapper mb-3">
            <span style="font-size: 3rem;">🔐</span>
          </div>
          <h2>Réinitialisation</h2>
          <p class="text-muted">Sécurisez votre accès à CertiTrack</p>
        </div>

        <div *ngIf="message"
             [ngClass]="isError ? 'alert-danger' : 'alert-success'"
             class="custom-alert animate__animated animate__fadeIn">
          {{ message }}
        </div>

        <div *ngIf="step === 1" class="step-container animate__animated animate__fadeIn">
          <p class="instruction-text mb-4">
            Pour votre sécurité, veuillez confirmer l'<strong>adresse e-mail professionnelle</strong> associée à ce compte.
          </p>

          <div class="input-group mb-4">
            <label for="emailCheck">Votre Email</label>
            <div class="input-wrapper">
              <span class="input-icon">✉️</span>
              <input
                id="emailCheck"
                [(ngModel)]="emailCheck"
                name="emailCheck"
                type="email"
                placeholder="nom@entreprise.com"
                required>
            </div>
          </div>

          <button (click)="verifyEmail()" class="btn-primary w-100" [disabled]="!emailCheck">
            Confirmer mon identité
          </button>
        </div>

        <div *ngIf="step === 2" class="step-container animate__animated animate__fadeIn">
          <p class="instruction-text mb-4">
            Identité vérifiée ! Choisissez maintenant votre nouveau mot de passe.
          </p>

          <div class="input-group mb-3">
            <label for="newPassword">Nouveau mot de passe</label>
            <div class="input-wrapper">
              <span class="input-icon">🔑</span>
              <input
                id="newPassword"
                [(ngModel)]="newPassword"
                name="newPassword"
                type="password"
                placeholder="Minimum 6 caractères"
                required>
            </div>
            <div class="pw-strength-bar mt-2" *ngIf="newPassword">
              <div class="strength-fill"
                   [style.width]="(newPassword.length * 10) + '%'"
                   [ngClass]="newPassword.length < 6 ? 'bg-danger' : 'bg-success'">
              </div>
            </div>
          </div>

          <button (click)="submitNewPassword()"
                  class="btn-primary w-100"
                  [disabled]="newPassword.length < 6">
            Mettre à jour le mot de passe
          </button>
        </div>

        <div class="auth-footer mt-4 text-center border-top pt-3">
          <a routerLink="/login" class="text-decoration-none small text-muted">
            ⬅ Retour à la page de connexion
          </a>
        </div>

      </div>
    </div>
  </div>
</div>
