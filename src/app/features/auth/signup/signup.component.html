<div class="signup-wrapper">
  <div class="signup-bg"></div>

  <div class="signup-container">
    <div class="signup-card">
      <div class="brand-title">
        <h2>Créer un compte</h2>
        <p>Inscrivez-vous pour passer vos certifications</p>
      </div>

      <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">

        <div class="form-row">
          <div class="form-group">
            <label for="nom">Nom</label>
            <input id="nom" formControlName="nom" type="text" class="modern-input" placeholder="Dupont">
            <span class="error-text" *ngIf="signupForm.get('nom')?.touched && signupForm.get('nom')?.invalid">Nom requis</span>
          </div>

          <div class="form-group">
            <label for="prenom">Prénom</label>
            <input id="prenom" formControlName="prenom" type="text" class="modern-input" placeholder="Jean">
            <span class="error-text" *ngIf="signupForm.get('prenom')?.touched && signupForm.get('prenom')?.invalid">Prénom requis</span>
          </div>
        </div>
        <div class="form-group">
          <label for="dateNais">Date de naissance</label>
          <input id="dateNais"
                 formControlName="dateNais"
                 type="date"
                 class="modern-input">
          <span class="error-text" *ngIf="signupForm.get('dateNais')?.touched && signupForm.get('dateNais')?.invalid">
    Date de naissance requise
  </span>
        </div>

        <div class="form-group">
          <label for="username">Email</label>
          <input id="username" formControlName="username" type="email" class="modern-input" placeholder="jean@exemple.com">
          <span class="error-text" *ngIf="signupForm.get('username')?.touched && signupForm.get('username')?.invalid">Email valide requis</span>
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input id="password" formControlName="password" type="password" class="modern-input" placeholder="••••••••">
          <span class="error-text" *ngIf="signupForm.get('password')?.touched && signupForm.get('password')?.invalid">Min 6 caractères</span>
        </div>

        <div class="form-group">
          <label>Téléphone</label>
          <input type="text" formControlName="numTel" class="modern-input">
        </div>

        <div class="form-group">
          <label>Email personnel</label>
          <input type="email" formControlName="emailPersonnel" class="modern-input">
        </div>

        <div class="form-group">
          <label>Établissement</label>

          <select formControlName="etablissementId" class="modern-input">
            <option value="">Choisir un établissement</option>
            <option *ngFor="let e of etablissements" [value]="e.idEtab">
              {{e.nom}}
            </option>
          </select>

        </div>

        <div *ngIf="errorMsg" class="error-msg">
          {{ errorMsg }}
        </div>

        <button type="submit" class="btn-primary" [disabled]="isLoading">
          {{ isLoading ? 'Inscription...' : 'S\'inscrire' }}
        </button>
      </form>

      <div class="footer-links">
        <p>Déjà inscrit ?</p>
        <a routerLink="/login" class="btn-secondary">Se connecter</a>
      </div>
    </div>
  </div>
</div>
